<section class="stats-band">
  <div class="stats-band-inner">
    <div class="stat-band-item" *ngFor="let s of stats; let i = index"
         [style.animation-delay]="i * 0.1 + 's'">
      <span class="stat-band-value">{{ s.value }}</span>
      <span class="stat-band-label">{{ s.label }}</span>
    </div>
  </div>
</section>
