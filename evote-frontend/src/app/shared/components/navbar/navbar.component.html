<header class="pub-navbar" [class.scrolled]="isScrolled">
  <div class="pub-navbar-inner">

    <!-- Brand -->
    <a routerLink="/" class="pub-brand">
      <div class="pub-brand-icon">
        <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="var(--color-primary)"/>
          <path d="M8 14.5L12 18.5L20 10" stroke="white" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>eVote</span>
    </a>

    <!-- Nav links -->
    <nav class="pub-nav-links">
      <a *ngFor="let link of navLinks"
         [href]="link.anchor"
         class="pub-nav-link"
         (click)="onAnchorClick(link.anchor, $event)">
        {{ link.label }}
      </a>
    </nav>

    <!-- Actions -->
    <div class="pub-nav-actions">
      <a routerLink="/login"    class="btn btn-ghost btn-sm">Se connecter</a>
      <a routerLink="/register" class="btn btn-primary btn-sm btn-pill">Commencer gratuitement</a>
    </div>

    <!-- Burger -->
    <button class="pub-burger" (click)="mobileOpen = !mobileOpen" aria-label="Ouvrir le menu">
      <span [class.open]="mobileOpen"></span>
      <span [class.open]="mobileOpen"></span>
      <span [class.open]="mobileOpen"></span>
    </button>

  </div>

  <!-- Mobile menu -->
  <div class="pub-mobile-menu" [class.open]="mobileOpen">
    <a *ngFor="let link of navLinks"
       [href]="link.anchor"
       class="pub-mobile-link"
       (click)="onAnchorClick(link.anchor, $event); mobileOpen = false">
      {{ link.label }}
    </a>
    <div class="pub-mobile-divider"></div>
    <a routerLink="/login"    class="pub-mobile-link"  (click)="mobileOpen = false">Se connecter</a>
    <a routerLink="/register" class="pub-mobile-cta"   (click)="mobileOpen = false">Commencer gratuitement</a>
  </div>
</header>
