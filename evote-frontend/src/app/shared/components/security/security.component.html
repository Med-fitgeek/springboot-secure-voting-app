<section class="security-section" id="security">
  <div class="section-inner">

    <div class="security-text">
      <div class="section-eyebrow">Sécurité</div>
      <h2 class="security-title">La confiance,<br>au cœur de chaque vote</h2>
      <p class="security-subtitle">
        Chaque électeur reçoit un token unique hashé en SHA-256.
        Un vote par personne. Un lien. Une seule chance. Aucune fraude possible.
      </p>

      <div class="security-features">
        <div class="security-feature" *ngFor="let sf of securityFeatures">
          <div class="security-check">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="security-feature-text">
            <strong>{{ sf.title }}</strong>
            <span>{{ sf.desc }}</span>
          </div>
        </div>
      </div>

      <a routerLink="/register" class="btn btn-primary btn-lg btn-pill">
        Démarrer maintenant
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>

    <!-- Visuel shield -->
    <div class="security-visual" aria-hidden="true">
      <div class="shield-bg">
        <div class="shield-ring shield-ring--1"></div>
        <div class="shield-ring shield-ring--2"></div>
        <div class="shield-ring shield-ring--3"></div>
        <div class="shield-icon">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
               stroke="white" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
        </div>
      </div>

      <div class="token-demo">
        <div class="token-label">Token électeur</div>
        <div class="token-value">xK9mP2…nR4qT</div>
        <div class="token-hash">SHA-256 → a3f8c1…</div>
      </div>
    </div>

  </div>
</section>
