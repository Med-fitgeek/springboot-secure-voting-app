<footer class="pub-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-brand-row">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="var(--color-primary)"/>
          <path d="M8 14.5L12 18.5L20 10" stroke="white" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="footer-brand-name">eVote</span>
      </div>
      <p class="footer-brand-tagline">
        La plateforme de vote en ligne sécurisée pour les organisateurs modernes.
      </p>
    </div>

    <div class="footer-links">
      <div class="footer-col">
        <span class="footer-col-title">Produit</span>
        <a href="#features" (click)="scrollTo('features', $event)">Fonctionnalités</a>
        <a href="#security" (click)="scrollTo('security', $event)">Sécurité</a>
        <a href="#how"      (click)="scrollTo('how', $event)">Guide</a>
      </div>
      <div class="footer-col">
        <span class="footer-col-title">Accès</span>
        <a routerLink="/login">Se connecter</a>
        <a routerLink="/register">Créer un compte</a>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    <span>© {{ currentYear }} eVote. Tous droits réservés.</span>
    <span>Développé avec ❤️ pour la démocratie numérique</span>
  </div>
</footer>
