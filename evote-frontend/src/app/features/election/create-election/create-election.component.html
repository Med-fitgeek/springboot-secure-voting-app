<div class="container mt-5">

  <h2>Create Election</h2>

  <form [formGroup]="electionForm" (ngSubmit)="onSubmit()">

    <div class="mb-3">
      <label>Title</label>
      <input class="form-control" formControlName="title">
    </div>

    <div class="mb-3">
      <label>Description</label>
      <textarea class="form-control" formControlName="description"></textarea>
    </div>

    <div class="mb-3">
      <label>Start Date</label>
      <input type="datetime-local" class="form-control" formControlName="startDate">
    </div>

    <div class="mb-3">
      <label>End Date</label>
      <input type="datetime-local" class="form-control" formControlName="endDate">
    </div>

---

<h4>Options</h4>

<div formArrayName="options">

  <div *ngFor="let option of options.controls; let i = index"
       class="input-group mb-2">

    <input
      class="form-control"
      [formControlName]="i">

    <button
      class="btn btn-danger"
      type="button"
      (click)="removeOption(i)">

      Remove
    </button>

  </div>

</div>

<button
  type="button"
  class="btn btn-secondary"
  (click)="addOption()">

  Add Option
</button>

---

<h4 class="mt-4">Voters</h4>

<div formArrayName="voters">

  <div *ngFor="let voter of voters.controls; let i = index"
       [formGroupName]="i"
       class="row mb-2">

    <div class="col">
      <input
        class="form-control"
        formControlName="name"
        placeholder="Name">
    </div>

    <div class="col">
      <input
        class="form-control"
        formControlName="email"
        placeholder="Email">
    </div>

    <div class="col-auto">

      <button
        class="btn btn-danger"
        type="button"
        (click)="removeVoter(i)">

        Remove
      </button>

    </div>

  </div>

</div>

<button
  type="button"
  class="btn btn-secondary"
  (click)="addVoter()">

  Add Voter
</button>

---

<br><br>

<button class="btn btn-primary">
  Create Election
</button>

</form>

</div>
