<div class="container mt-5">

  <h2>Election Results</h2>

  <canvas #chartCanvas></canvas>

  <table class="table mt-4">
    <thead>
      <tr>
        <th>Option</th>
        <th>Votes</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let result of results">
        <td>{{ result.label }}</td>
        <td>{{ result.votes }}</td>
      </tr>
    </tbody>

  </table>

</div>
