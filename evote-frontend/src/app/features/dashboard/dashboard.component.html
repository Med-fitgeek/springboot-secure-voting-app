<div class="container mt-5">

  <h2 class="mb-4">Dashboard</h2>

  <div class="row g-4">

    <div class="col-md-3">
      <div class="card stat-card bg-primary text-white">
        <div class="card-body">
          <h5>Total Elections</h5>
          <h2>{{ stats.elections }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card bg-success text-white">
        <div class="card-body">
          <h5>Total Voters</h5>
          <h2>{{ stats.voters }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card bg-warning text-dark">
        <div class="card-body">
          <h5>Votes Cast</h5>
          <h2>{{ stats.votes }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card bg-dark text-white">
        <div class="card-body">
          <h5>Active Elections</h5>
          <h2>{{ stats.active }}</h2>
        </div>
      </div>
    </div>

  </div>

</div>
